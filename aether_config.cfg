################################################################
############## AETHER Runtime Parameters File ##################
####### (inspired by pluto config layout, cuz I like it) #######
################################################################

#########################
# Domain Specifications #
#########################

num_x_cells                             1920
num_y_cells                             480            # Overwrites to 0 in 1D builds
num_z_cells                             100            # Overwrites to 0 in 2D builds
num_ghost_cells                         4

x_domain_start : x_domain_end           0.0 : 4.0     
y_domain_start : y_domain_end           0.0 : 1.0     # Ignored in 1D problems
z_domain_start : z_domain_end           0.0 : 1.0     # Ignored in 2D problems

##########################
### Run Specifications ###
##########################

cfl_number                              0.99
time_start : time_end                   0.0 : 0.2
time_stepper                            char_trace    # TODO: char_trace, rk1, rk2, rk3, rk4
riemann_solver                          HLL           # HLL | TODO: | HLLC | ROE | EXACT
spatial_solver                          PPM           # FOG | TODO: | PLM  | PPM | WENO3 | WENO5
slope_limiter                           vanleer        # vanleer | mc | minmod
num_quadrature_points                   1
gamma                                   1.4
test_problem                            DMR        # SOD | SOD_Y | SOD_Z | DMR | SEDOV | CUSTOM | LOAD
boundary_conditions                     DMR           # Outflow | Periodic | Refecting  
use_test_defaults                       false         # true | false: if true overloads 
                                                      # above parameters with test problem defaults

#############################
### Output Specifications ###
#############################

write_text                              true
write_ascii                             false         # Double precision binary file (I know, bad name)
write_hdf5                              false
snapshot_every                          10           # 0 = disabled

custom_output_dir                       ""           # Defaults to ${AETHER_ROOT_DIR}/OutputData/
